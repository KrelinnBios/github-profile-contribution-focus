name: Update contribution focus chart

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/update-contribution-focus.yml"
      - "contribution-focus.config.json"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Generate contribution focus chart
        id: contribution-focus
        uses: KrelinnBios/github-profile-contribution-focus@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config-path: contribution-focus.config.json
          output-prefix: contribution-focus

      - name: Commit generated chart
        if: steps.contribution-focus.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- README.md 'contribution-focus-*.svg'
          git commit -m "Update contribution focus chart"
          git push
